name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Deploy to CubePath
        uses: appleboy/ssh-action@v1
        with:
          host: 45.90.237.246
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            export PATH="/root/.bun/bin:$PATH"
            cd /opt/cubepath-assistant
            git pull origin main
            bun install
            cd launcher-web && bunx vite build && cd ..
            kill $(cat /tmp/api.pid 2>/dev/null) 2>/dev/null || true
            kill $(cat /tmp/web.pid 2>/dev/null) 2>/dev/null || true
            sleep 1
            CUBEPATH_API_KEY=${{ secrets.CUBEPATH_API_KEY }} nohup /root/.bun/bin/bun run launcher-api/index.ts > /tmp/api.log 2>&1 & echo $! > /tmp/api.pid
            nohup /root/.bun/bin/bun serve.ts > /tmp/web.log 2>&1 & echo $! > /tmp/web.pid
            sleep 1
            echo "Deploy complete"
