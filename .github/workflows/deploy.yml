name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to CubePath
        uses: appleboy/ssh-action@v1
        with:
          host: 45.90.237.246
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            export PATH="/root/.bun/bin:$PATH"
            cd /opt/cubepath-assistant
            git pull origin main
            bun install
            cd launcher-web && bunx vite build && cd ..
            pkill -f "bun.*serve.ts" || true
            pkill -f "bun.*launcher-api" || true
            sleep 1
            CUBEPATH_API_KEY=${{ secrets.CUBEPATH_API_KEY }} nohup bun run launcher-api/index.ts > /tmp/api.log 2>&1 &
            nohup bun serve.ts > /tmp/web.log 2>&1 &
